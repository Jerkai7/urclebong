<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cek Progres Pengajuan BPJS</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{ --pad: 8px; }

    body{
      background:linear-gradient(135deg,#0052A0,#003B73);
      min-height:100vh;
      min-height:100svh;
      padding:
        calc(var(--pad) + env(safe-area-inset-top))
        calc(var(--pad) + env(safe-area-inset-right))
        calc(var(--pad) + env(safe-area-inset-bottom))
        calc(var(--pad) + env(safe-area-inset-left));
    }

    .app-shell{width:100%;max-width:720px;}
    @media (max-width:576px){
      .app-shell{max-width:100%;}
    }

    .bpjs-header{
      background:linear-gradient(135deg,#0052A0,#003B73);
      border-bottom:4px solid #FFD700;
    }

    .badge-status{ font-size:.85rem; padding:.35rem .6rem; border-radius:999px; }
    .name-btn{ cursor:pointer; }
    .small-muted{ font-size:.9rem; color:#6c757d; }
  </style>
</head>

<body>
  <div class="d-flex justify-content-center px-0">
    <div class="app-shell">

      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="bpjs-header text-white text-center p-4">
          <h1 class="h5 fw-bold mb-1">Cek Progres Pengajuan</h1>
          <div class="small opacity-75">URC JKN Bengkulu</div>
        </div>

        <div class="card-body bg-light p-2 p-sm-4">

          <!-- Tombol kembali ke form -->
          <div class="d-grid mb-2">
            <a href="index.html" class="btn btn-primary rounded-4 py-2 fw-semibold">
              ⬅ Kembali ke Form Pengajuan
            </a>
          </div>

          <div class="alert alert-primary border-0 rounded-4 mb-3">
            <div class="small">
              Klik nama untuk melihat status & pesan dari admin. Gunakan pencarian bila datanya banyak.
            </div>
          </div>

          <!-- Pencarian + Refresh -->
          <div class="row g-2 align-items-end">
            <div class="col-sm-8">
              <label class="form-label fw-semibold mb-1">Cari Nama</label>
              <input id="search" class="form-control rounded-4" placeholder="Ketik nama..." />
            </div>
            <div class="col-sm-4 d-grid">
              <button class="btn btn-outline-secondary rounded-4 py-2" id="btnRefresh">🔄 Refresh</button>
            </div>
          </div>

          <!-- List -->
          <div id="list" class="mt-3"></div>

          <!-- Detail -->
          <div id="detail" class="mt-3"></div>

        </div>

        <div class="card-footer text-center small text-secondary bg-white">
          © 2026 BPJS URC JKN Bengkulu
        </div>
      </div>

    </div>
  </div>

<script>
  // URL Apps Script kamu
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRPNeZ8R5dATewhUuuxVv84UM_-Eu53_qRBoIfK2A4VcocRhUQr4D4D5UFXzkcDFY/exec";

  const listEl = document.getElementById("list");
  const detailEl = document.getElementById("detail");
  const searchEl = document.getElementById("search");
  const btnRefresh = document.getElementById("btnRefresh");

  let allItems = [];

  function badge(status){
    const s = (status || "Antrian").toUpperCase();
    if(s === "SELESAI") return `<span class="badge bg-success badge-status">SELESAI</span>`;
    if(s === "KENDALA") return `<span class="badge bg-danger badge-status">KENDALA</span>`;
    return `<span class="badge bg-warning text-dark badge-status">ANTRIAN</span>`;
  }

  function fmtTime(v){
    try{
      if(!v) return "-";
      return new Date(v).toLocaleString("id-ID");
    }catch(e){
      return "-";
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function renderList(items){
    detailEl.innerHTML = "";

    if(!items.length){
      listEl.innerHTML = `<div class="alert alert-light rounded-4">Belum ada data pengajuan.</div>`;
      return;
    }

    const rows = items.map((it, idx)=>`
      <div class="list-group-item d-flex justify-content-between align-items-center gap-2 name-btn" data-idx="${idx}">
        <div>
          <div class="fw-semibold">${escapeHtml(it.nama)}</div>
          <div class="small-muted">Update: ${fmtTime(it.updateTerakhir || it.waktu)}</div>
        </div>
        <div>${badge(it.status)}</div>
      </div>
    `).join("");

    listEl.innerHTML = `<div class="list-group rounded-4 overflow-hidden">${rows}</div>`;

    listEl.querySelectorAll(".name-btn").forEach(el=>{
      el.addEventListener("click", ()=>{
        const i = Number(el.getAttribute("data-idx"));
        showDetail(items[i]);
      });
    });
  }

  function showDetail(it){
    detailEl.innerHTML = `
      <div class="card rounded-4 border-0 shadow-sm">
        <div class="card-body p-3 p-sm-4">
          <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
            <div>
              <div class="fw-bold fs-5 mb-1">${escapeHtml(it.nama)}</div>
              <div class="small-muted">Update terakhir: ${fmtTime(it.updateTerakhir || it.waktu)}</div>
            </div>
            <div>${badge(it.status)}</div>
          </div>

          <hr>

          <div class="fw-semibold mb-1">Pesan admin</div>
          <div>${escapeHtml(it.pesan || "-").replaceAll("\n","<br>")}</div>
        </div>
      </div>
    `;
    detailEl.scrollIntoView({behavior:"smooth", block:"start"});
  }

  async function load(){
    listEl.innerHTML = `<div class="alert alert-light rounded-4">Memuat data...</div>`;
    detailEl.innerHTML = "";

    try{
      const res = await fetch(`${APPS_SCRIPT_URL}?mode=list`);
      const data = await res.json();

      if(!data.ok){
        listEl.innerHTML = `<div class="alert alert-danger rounded-4">Gagal memuat data.</div>`;
        return;
      }

      allItems = data.items || [];
      applySearch();
    }catch(err){
      console.warn(err);
      listEl.innerHTML = `<div class="alert alert-danger rounded-4">
        Tidak bisa mengambil data. Pastikan Apps Script sudah di-deploy ulang (Manage deployments → Edit → New Version → Deploy).
      </div>`;
    }
  }

  function applySearch(){
    const q = (searchEl.value || "").trim().toLowerCase();
    const filtered = !q ? allItems : allItems.filter(it => String(it.nama||"").toLowerCase().includes(q));
    renderList(filtered);
  }

  searchEl.addEventListener("input", applySearch);
  btnRefresh.addEventListener("click", load);

  load();
</script>
</body>
</html>
